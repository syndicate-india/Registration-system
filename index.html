<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Syndicate India</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: url('https://images.unsplash.com/photo-1508780709619-79562169bc64') no-repeat center/cover;
}

/* HEADER */
.header {
  position: fixed;
  top: 0;
  width: 100%;
  height: 70px;
  display: flex;
  align-items: center;
  padding: 10px 20px;
  background: linear-gradient(to right, #0a2a66, #1e4db7);
  color: white;
  border-bottom: 3px solid orange;
}

.logo {
  width: 55px;
  height: 55px;
  border-radius: 50%;
  margin-right: 10px;
}

/* FORM */
.container {
  width: 330px;
  margin: 120px auto;
  padding: 20px;
  border-radius: 15px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(12px);
  color: white;
  text-align: center;
}

input {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 8px;
  border: none;
  outline: none;
}

button {
  width: 100%;
  padding: 10px;
  background: #0072ff;
  border: none;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

button:hover { background: #0056b3; }

.hidden { display: none; }

.toggle {
  color: #00c6ff;
  cursor: pointer;
  margin-top: 8px;
}

.info {
  font-size: 13px;
  margin: 5px 0;
  color: #ddd;
}

/* Terms */
.terms {
  display: flex;
  align-items: center;
  font-size: 13px;
  margin-top: 8px;
  gap: 5px;
}

.terms a {
  color: #00c6ff;
  text-decoration: none;
}
.hecker label {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
}

.hecker span {
  white-space: nowrap; /* line break rokega */
  font-size: 13px;
}
</style>
</head>

<body>

<header class="header">
  <img src="https://i.ibb.co/v4q9v4BV/file-00000000099c71fd82408109e2e8fbbb.png" class="logo">
  <h3>Syndicate India LLP</h3>
</header>

<div class="container">

<h2 id="title">Register</h2>

<form onsubmit="return false;">

<!-- REGISTER -->
<div id="registerBox">
  <input type="text" id="name" placeholder="Full Name" required>
  <input type="email" id="email" placeholder="Email" required>
  <input type="tel" id="mobile" placeholder="Mobile Number" required>
  <input type="password" id="password" placeholder="Password" required>
</div>

<!-- LOGIN -->
<div id="loginBox" class="hidden">
  <input type="text" id="loginInput" placeholder="Email or Mobile">
  <input type="password" id="loginPass" placeholder="Password">
</div>

<!-- FORGOT PASSWORD -->
<div id="forgotBox" class="hidden">
  <input type="text" id="recoverInput" placeholder="Email or Mobile">

  <button type="button" onclick="sendOTP()">Send OTP</button>

  <div class="info" id="maskedInfo"></div>

  <input type="text" id="otp" placeholder="Enter OTP">
  <input type="password" id="newPass" placeholder="New Password">

  <button type="button" onclick="resetPassword()">Change Password</button>
</div>

<button type="button" onclick="submitForm()">Submit</button>
<div class="hecker">
  <label>
    <input id="termsCheck" type="checkbox">
    <span>I read all the 
      <a href="terms.html" target="_blank">Terms & Conditions</a>
    </span>
  </label>
</div>
</form>

<p class="toggle" onclick="switchMode()">Switch Login/Register</p>
<p class="toggle" onclick="showForgot()">Forgot Password?</p>

</div>
<script>
let mode = "register";
const API = "https://script.google.com/macros/s/AKfycbwlThbPDdmVfUrc3bsGBaBX5Hx1p_BO5uhqHagEoH5mgdEuz6UyXNSy9ZKKdtyh57r0/exec";

// SWITCH MODE
function switchMode() {
  mode = (mode === "register") ? "login" : "register";

  registerBox.classList.toggle("hidden");
  loginBox.classList.toggle("hidden");
  forgotBox.classList.add("hidden");

  title.innerText = mode === "login" ? "Login" : "Register";
}

// FORGOT
function showForgot() {
  mode = "forgot";

  registerBox.classList.add("hidden");
  loginBox.classList.add("hidden");
  forgotBox.classList.remove("hidden");

  title.innerText = "Forgot Password";
}

// MOBILE VALIDATION
function validateMobile(num) {
  return /^[6-9]\d{9}$/.test(num);
}

// MAIN SUBMIT
function submitForm() {

  // TERMS only for register
  if (mode === "register" && !termsCheck.checked) {
    alert("Accept Terms ❗");
    return;
  }

  // REGISTER
  if (mode === "register") {

    let name = name.value;
    let email = email.value;
    let mobile = mobile.value;
    let password = password.value;

    if (!validateMobile(mobile)) {
      alert("Invalid Mobile ❌");
      return;
    }

    fetch(API,{
      method:"POST",
      body: JSON.stringify({
        action:"register",
        name, email, mobile, password
      })
    })
    .then(res=>res.json())
    .then(data=>{
      alert(data.message);
    });
  }

  // LOGIN
  else if (mode === "login") {

    let input = loginInput.value;
    let password = loginPass.value;

    fetch(API,{
      method:"POST",
      body: JSON.stringify({
        action:"login",
        email: input,
        password
      })
    })
    .then(res=>res.json())
    .then(data=>{

      if(data.status === "banned"){
        alert("Your account was banned ❌\nReason: " + data.reason);
        return;
      }

      if(data.status === "success"){
        localStorage.setItem("user", JSON.stringify({
          email: input
        }));
        alert("Login Success ✅");
        window.location.href = "dashboard.html";
      } else {
        alert("Invalid Login ❌");
      }
    });
  }
}

// OTP SEND
function sendOTP() {
  let input = recoverInput.value;

  fetch(API,{
    method:"POST",
    body: JSON.stringify({
      action:"sendOTP",
      email: input
    })
  })
  .then(res=>res.json())
  .then(data=>{
    if(data.status==="success"){
      alert("OTP sent to Email 📩");
    } else {
      alert("Email not found ❌");
    }
  });
}

// RESET PASSWORD
function resetPassword() {
  let email = recoverInput.value;
  let otp = otp.value;
  let newPass = newPass.value;

  fetch(API,{
    method:"POST",
    body: JSON.stringify({
      action:"resetPassword",
      email, otp, newPass
    })
  })
  .then(res=>res.json())
  .then(data=>{
    if(data.status==="success"){
      alert("Password Changed ✅");
      switchMode();
    } else {
      alert("Wrong OTP ❌");
    }
  });
}
</script>

</body>
</html>
